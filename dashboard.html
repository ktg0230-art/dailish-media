<style>
:root{--bg:#faf7f4;--card:#fff;--ink:#2b2b2b;--mut:#9b8e85;--line:#ece4dd;--ac:#c9a27a;--ok:#7fae8b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif}
header{padding:20px 16px 6px;text-align:center}h1{margin:0;font-size:19px}.sub{color:var(--mut);font-size:13px;margin-top:5px}
.sub a{color:var(--ac)}
.legend{font-size:12px;color:var(--mut);margin-top:8px}.legend b{color:var(--ok)}
.wrap{max-width:760px;margin:0 auto;padding:14px}
.day{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.day.today{border-color:var(--ac);box-shadow:0 0 0 2px rgba(201,162,122,.25)}
.dlabel{width:78px;flex:none;font-size:12px}.dlabel .dd{font-weight:800;font-size:14px}.dlabel .wd{color:var(--mut)}
.dlabel .tg{display:inline-block;margin-top:3px;font-size:10px;padding:1px 6px;border-radius:7px;background:var(--ac);color:#fff}
.slots{display:flex;gap:8px;flex:1}
.slot{flex:1;text-align:center;position:relative}
.slot .t{font-size:10px;color:var(--mut);margin-bottom:3px}
.slot .ph{display:block;width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;background:#f0ece8}
.slot.story .ph{aspect-ratio:9/16}
.empty{display:flex;align-items:center;justify-content:center;color:#cfc4ba;font-size:18px;height:100%;min-height:60px;border:1px dashed var(--line);border-radius:8px}
.st{position:absolute;top:3px;right:3px;font-size:9px;padding:1px 5px;border-radius:6px;color:#fff}
.s-done{background:rgba(0,0,0,.55)}.s-now{background:var(--ac)}.s-soon{background:#bdae9f}
.vb{position:absolute;top:3px;left:3px;font-size:9px;background:rgba(0,0,0,.6);color:#fff;padding:1px 4px;border-radius:5px}
.done .ph{filter:grayscale(.3) opacity(.85)}
</style></head><body>

function dubaiNow(){var d=new Date();return new Date(d.getTime()+d.getTimezoneOffset()*60000+4*3600000);}
var now=dubaiNow();
var wd=['일','월','화','수','목','금','토'];
function stat(date,hh){var dt=new Date(date+'T00:00:00');dt.setHours(hh);var diff=dt-now;
  if(diff<0)return['done','게시완료'];if(date===now.toISOString().slice(0,10))return['now','오늘'];return['soon','예정'];}
var L=document.getElementById('list');
DATA.forEach(function(d){
  var dt=new Date(d.date+'T00:00:00');var isToday=d.date===now.toISOString().slice(0,10);
  function cell(item,hh,label,isStory){
    if(!item)return '<div class="slot'+(isStory?' story':'')+'"><div class="t">'+label+'</div><div class="empty">—</div></div>';
    var s=stat(d.date,hh);
    var media='<img class="ph" loading="lazy" src="'+item.thumb+'">';
    if(item.vid)media='<video class="ph" src="'+item.thumb+'" muted preload="metadata"></video>';
    return '<div class="slot'+(isStory?' story':'')+' '+(s[0]==='done'?'done':'')+'"><div class="t">'+label+'</div>'+
      (item.vid?'<span class="vb">▶</span>':'')+media+'<span class="st s-'+s[0]+'">'+s[1]+'</span></div>';
  }
  var row='<div class="day'+(isToday?' today':'')+'"><div class="dlabel"><span class="dd">'+d.date.slice(5).replace('-','/')+'</span> <span class="wd">('+wd[dt.getDay()]+')</span>'+(isToday?'<br><span class="tg">오늘</span>':'')+'</div><div class="slots">'+
    cell(d.am,10,'10시',true)+cell(d.feed,14,'14시 피드',false)+cell(d.pm,16,'16시',true)+'</div></div>';
  L.insertAdjacentHTML('beforeend',row);
});
</script></body></html>
