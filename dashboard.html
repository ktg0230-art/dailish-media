<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Dailish 오늘 게시 현황</title>
<style>
:root{--bg:#f5f0e8;--card:#fff;--ink:#3a322c;--mut:#9b8e85;--line:#e9e0d5;--gold:#c9a86a;--rose:#c98a8a;--feed:#8aa6c9;--ok:#3ea66a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 30px}
.brand{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase;text-align:center}
h1{margin:4px 0 2px;font-size:24px;font-weight:800;text-align:center}
.dateline{text-align:center;color:var(--mut);font-size:15px;margin-bottom:4px}
.prog{text-align:center;font-size:14px;margin:10px 0 18px}.prog b{color:var(--ok);font-size:16px}
.hero{background:var(--card);border:2px solid var(--gold);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(201,168,106,.15)}
.htitle{font-size:14px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:14px;text-align:center}
.slots{display:flex;gap:12px}
.slot{flex:1;text-align:center}
.slot .lab{font-size:12px;font-weight:700;margin-bottom:7px}
.slot.story .lab{color:var(--rose)}.slot.feed .lab{color:var(--feed)}
.phwrap{position:relative;border-radius:13px;overflow:hidden}
.ph{display:block;width:100%;object-fit:cover;background:#f0ece6}
.slot.story .ph{aspect-ratio:9/16}.slot.feed .ph{aspect-ratio:9/16}
.ph.none{display:flex;align-items:center;justify-content:center;color:#d8cdc0;font-size:24px;border:1px dashed var(--line);aspect-ratio:9/16}
.badge{position:absolute;left:7px;top:7px;font-size:12px;font-weight:800;padding:3px 10px;border-radius:9px;color:#fff}
.b-done{background:var(--ok)}.b-now{background:var(--gold)}.b-soon{background:rgba(58,50,44,.55)}
.vb{position:absolute;right:7px;top:7px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;padding:2px 6px;border-radius:6px}
.isdone .ph{filter:grayscale(.15)}
.meta{font-size:11px;color:var(--mut);margin-top:6px}
.tmr{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.tmr .tt{font-size:12px;color:var(--mut);font-weight:700;margin-bottom:8px}
.tmini{display:flex;gap:10px;align-items:center}
.tmini .mph{width:46px;border-radius:7px;overflow:hidden;display:block}.tmini .mph img,.tmini .mph video{width:100%;display:block}
.tmini .feed .mph{aspect-ratio:1}
.tmini span.x{color:#d8cdc0}
.btns{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;text-align:center;padding:14px;border-radius:13px;background:var(--card);border:1px solid var(--line);font-weight:800;color:var(--ink);text-decoration:none;font-size:14px}
.btn b{display:block;color:var(--ok);font-size:12px;font-weight:700;margin-top:3px}
</style></head><body>

function dnow(){var d=new Date();return new Date(d.getTime()+d.getTimezoneOffset()*60000+4*3600000);}
var now=dnow();function ymd(d){return d.toISOString().slice(0,10);}
var today=ymd(now),tmr=ymd(new Date(now.getTime()+86400000));
var wd=['일','월','화','수','목','금','토'];
function st(date,hh){var t=new Date(date+'T00:00:00Z');t.setUTCHours(hh);if(t<now)return['done','✓ 완료'];if(date===today)return['now','오늘 예정'];return['soon','예정'];}
function feedOf(ds){for(var i=0;i<FD.length;i++)if(FD[i].date===ds)return FD[i];return null;}
function storyOf(ds,sl){for(var i=0;i<SD.length;i++)if(SD[i].date===ds&&SD[i].slot===sl)return SD[i];return null;}
function bigSlot(item,date,hh,lab,kind){
  if(!item)return '<div class="slot '+kind+'"><div class="lab">'+lab+'</div><div class="ph none">—</div></div>';
  var s=st(date,hh);var m=item.vid?'<video class="ph" src="'+item.thumb+'" muted preload="metadata"></video>':'<img class="ph" src="'+item.thumb+'">';
  return '<div class="slot '+kind+(s[0]==='done'?' isdone':'')+'"><div class="lab">'+lab+'</div><div class="phwrap">'+(item.vid?'<span class="vb">▶</span>':'')+m+'<span class="badge b-'+s[0]+'">'+s[1]+'</span></div><div class="meta">#'+item.seq+'</div></div>';
}
var dt0=new Date(today+'T00:00:00');
document.getElementById('dateline').innerHTML=today.replace(/-/g,'.')+' ('+wd[dt0.getDay()]+') · 두바이 기준';
// progress overall
var fdDone=FD.filter(function(e){return st(e.date,14)[0]==='done';}).length;
var sdDone=SD.filter(function(e){return st(e.date,e.slot==='am'?10:16)[0]==='done';}).length;
document.getElementById('prog').innerHTML='지금까지 <b>'+(fdDone+sdDone)+'</b>개 게시 완료 · 남음 '+((FD.length+SD.length)-(fdDone+sdDone));
document.getElementById('fdone').innerHTML='완료 '+fdDone+'/'+FD.length;
document.getElementById('sdone').innerHTML='완료 '+sdDone+'/'+SD.length;
// today
document.getElementById('todaySlots').innerHTML=
  bigSlot(storyOf(today,'am'),today,10,'🌅 10시 스토리','story')+
  bigSlot(feedOf(today),today,14,'📷 14시 피드','feed')+
  bigSlot(storyOf(today,'pm'),today,16,'🌙 16시 스토리','story');
// tomorrow mini
function mini(item,kind){if(!item)return '<span class="x">—</span>';var m=item.vid?'<video src="'+item.thumb+'" muted preload="metadata"></video>':'<img src="'+item.thumb+'">';return '<span class="'+kind+'"><span class="mph">'+m+'</span></span>';}
var tdt=new Date(tmr+'T00:00:00');
document.getElementById('tmrBox').innerHTML='<div class="tt">내일 '+tmr.slice(5).replace('-','/')+' ('+wd[tdt.getDay()]+')</div><div class="tmini">'+
  '10시 '+mini(storyOf(tmr,'am'),'story')+' &nbsp; 14시 '+mini(feedOf(tmr),'feed')+' &nbsp; 16시 '+mini(storyOf(tmr,'pm'),'story')+'</div>';
