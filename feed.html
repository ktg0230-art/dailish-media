:root{--bg:#faf7f4;--card:#fff;--ink:#2b2b2b;--mut:#9b8e85;--line:#ece4dd;--ac:#c9a27a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',Roboto,'Malgun Gothic',sans-serif}
header{padding:22px 18px 8px;text-align:center}
h1{margin:0;font-size:20px;letter-spacing:.5px}
.sub{color:var(--mut);font-size:13px;margin-top:6px}
.legend{display:flex;gap:14px;justify-content:center;margin:12px 0 4px;font-size:12px;color:var(--mut);flex-wrap:wrap}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.wrap{max-width:1100px;margin:0 auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}

.thumb{width:100%;aspect-ratio:1;object-fit:cover;background:#f0ece8;display:block}
.body{padding:10px 11px 12px}
.row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.date{font-weight:700;font-size:13px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;color:#fff}
.b-photo{background:#7fae8b}.b-carousel{background:#7a9bc9}.b-reel{background:#c98a8a}
.cap{font-size:11.5px;color:#6c615a;line-height:1.4;max-height:48px;overflow:hidden}
.tag{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.t-done{background:rgba(0,0,0,.55);color:#fff}.t-today{background:var(--ac);color:#fff}.t-soon{background:rgba(255,255,255,.85);color:#8a7a6b}
.dn .thumb{filter:grayscale(.35) opacity(.8)}
</style></head><body>

function dubaiToday(){var d=new Date();var u=d.getTime()+d.getTimezoneOffset()*60000;var x=new Date(u+4*3600000);return x.toISOString().slice(0,10);}
var today=dubaiToday();

var wd=['일','월','화','수','목','금','토'];
var g=document.getElementById('grid');
DATA.forEach(function(e){
  var st = e.date<today?'done':(e.date===today?'today':'soon');
  var dt=new Date(e.date+'T00:00:00');var day=wd[dt.getDay()];
  var media = e.vid? '<video class="thumb" src="'+e.thumb+'" muted preload="metadata"></video>'
                   : '<img class="thumb" loading="lazy" src="'+e.thumb+'">';
  var tag = st==='done'?'<span class="tag t-done">게시완료</span>'
          : st==='today'?'<span class="tag t-today">오늘 게시</span>'
          : '<span class="tag t-soon">예정</span>';
  var card=document.createElement('div');
  card.className='card'+(st==='done'?' dn':'');
  card.innerHTML=tag+media+'<div class="body"><div class="row1"><span class="date">'+
    e.date.slice(5).replace('-','/')+' ('+day+')</span>'+
    '<span class="badge b-'+e.type+'">'+names[e.type]+'</span></div>'+
    '<div class="cap">#'+e.seq+' · '+(e.cap||'').replace(/</g,'&lt;')+'</div></div>';
  g.appendChild(card);
});
