<style>
:root{--bg:#f5f0e8;--card:#fff;--ink:#3a322c;--mut:#9b8e85;--line:#e9e0d5;--gold:#c9a86a;--ok:#3ea66a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif}
header{padding:22px 16px 6px;text-align:center}.brand{font-size:12px;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase}
h1{margin:2px 0 0;font-size:21px;font-weight:800}.sub{color:var(--mut);font-size:13px;margin-top:6px}.sub a{color:var(--gold)}
.wrap{max-width:1100px;margin:0 auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.07)}
.thumb{width:100%;aspect-ratio:1;object-fit:cover;background:#f0ece6;display:block}
.badge{position:absolute;top:8px;left:8px;font-size:11px;font-weight:800;padding:3px 9px;border-radius:9px;color:#fff;display:flex;align-items:center;gap:3px;z-index:2}
.b-done{background:var(--ok)}.b-now{background:var(--gold)}.b-soon{background:rgba(58,50,44,.5)}
.multi{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 7px;border-radius:7px;z-index:2}
.done .thumb{filter:grayscale(.15)}
.body{padding:9px 11px 11px}
.row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.date{font-weight:800;font-size:13px}.tp{font-size:10px;color:var(--mut)}
.cap{font-size:11px;color:#6c615a;line-height:1.4;max-height:31px;overflow:hidden}
</style></head><body>
