<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Dailish 게시 현황</title>
<style>
:root{--bg:#f5f0e8;--card:#fff;--ink:#3a322c;--mut:#9b8e85;--line:#e9e0d5;--gold:#c9a86a;--rose:#c98a8a;--feed:#8aa6c9;--ok:#7fae8b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased}
.top{max-width:680px;margin:0 auto;padding:22px 16px 6px}
.brand{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase}
h1{margin:2px 0 0;font-size:22px;font-weight:800}
.summary{margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.summary .big{font-size:15px;font-weight:700}.summary .mut{color:var(--mut);font-size:13px}
.bar{flex:1;min-width:120px;height:8px;background:#eee5d8;border-radius:5px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--rose))}
.next{margin-top:8px;font-size:13px;color:var(--ink)}.next b{color:var(--rose)}
.wrap{max-width:680px;margin:0 auto;padding:8px 16px 30px}
.sechead{font-size:13px;font-weight:800;letter-spacing:1px;color:var(--mut);margin:20px 4px 8px;text-transform:uppercase}
.hero{background:var(--card);border:2px solid var(--gold);border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(201,168,106,.13)}
.hero .hd{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.hero .hd .dd{font-size:20px;font-weight:800}.hero .hd .wd{color:var(--mut)}.hero .hd .tg{margin-left:auto;background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px}
.card .hd{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}.card .hd .dd{font-size:16px;font-weight:800}.card .hd .wd{color:var(--mut);font-size:13px}.card .hd .tg{margin-left:auto;color:var(--mut);font-size:11px;border:1px solid var(--line);padding:2px 9px;border-radius:9px}
.slots{display:flex;gap:10px}
.slot{flex:1;text-align:center}
.slot .lab{font-size:11px;color:var(--mut);margin-bottom:5px;font-weight:600}
.slot.feed .lab{color:var(--feed)}.slot.story .lab{color:var(--rose)}
.phwrap{position:relative;border-radius:11px;overflow:hidden}
.ph{display:block;width:100%;object-fit:cover;background:#f0ece6}
.slot.story .ph{aspect-ratio:9/16}.slot.feed .ph{aspect-ratio:1}
.big .slot.story .ph{aspect-ratio:9/16}
.ph.none{aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#d8cdc0;font-size:20px;border:1px dashed var(--line);background:transparent}
.badge{position:absolute;left:5px;bottom:5px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;color:#fff}
.b-done{background:rgba(58,50,44,.78)}.b-now{background:var(--gold)}.b-soon{background:#bdae9f}
.vb{position:absolute;top:5px;right:5px;font-size:10px;background:rgba(0,0,0,.55);color:#fff;padding:1px 5px;border-radius:6px}
.isdone .ph{filter:grayscale(.35) opacity(.82)}
.meta{font-size:10px;color:var(--mut);margin-top:4px}
.tabs{display:flex;gap:8px;margin:20px 4px 10px}
.tab{flex:1;padding:10px;border:1px solid var(--line);background:var(--card);border-radius:11px;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;text-align:center}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.mrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:7px 11px;margin-bottom:7px}
.mrow.istoday{border-color:var(--gold)}
.mdate{width:88px;flex:none;font-size:12.5px;font-weight:700}.mdate .wd{color:var(--mut);font-weight:400}
.mcells{display:flex;gap:7px;flex:1;justify-content:flex-end}
.m-cell{width:30px;height:40px;border-radius:6px;overflow:hidden;display:inline-block;position:relative;background:#f0ece6}
.m-cell.feed{height:30px;width:30px;align-self:center}
.m-ph{width:100%;height:100%;object-fit:cover;display:block}
.m-cell.isdone .m-ph{filter:grayscale(.4) opacity(.7)}
.m-none{width:14px;height:30px;background:transparent;color:#d8cdc0;text-align:center}
.hide{display:none}
.foot{text-align:center;color:var(--mut);font-size:12px;margin-top:18px}.foot a{color:var(--gold)}
</style></head><body>
<div class="top">
<div class="brand">Dailish</div><h1>게시 현황</h1>
<div class="summary"><span class="big" id="sumdate"></span><div class="bar"><i id="barfill"></i></div><span class="mut" id="sumcount"></span></div>
<div class="next" id="nextline"></div>
</div>
<div class="wrap">
<div class="sechead">오늘</div><div id="today"></div>
<div class="sechead">내일</div><div id="tmr"></div>
<div class="tabs"><div class="tab on" id="tabUp" onclick="show('up')">📅 앞으로</div><div class="tab" id="tabPast" onclick="show('past')">✅ 지난 게시</div></div>
<div id="listUp"></div><div id="listPast" class="hide"></div>
<div class="foot"><a href="feed.html">피드 달력</a> · <a href="stories.html">스토리 전체</a></div>
</div>

function dnow(){var d=new Date();return new Date(d.getTime()+d.getTimezoneOffset()*60000+4*3600000);}
var now=dnow();function ymd(d){return d.toISOString().slice(0,10);}
var today=ymd(now), tmr=ymd(new Date(now.getTime()+86400000));
var wd=['일','월','화','수','목','금','토'];
function past(date,hh){var t=new Date(date+'T00:00:00Z');t.setUTCHours(hh);return t<now;}
var SL=[['am',10,'🌅 10시 스토리','story'],['feed',14,'📷 14시 피드','feed'],['pm',16,'🌙 16시 스토리','story']];
var doneN=0,totalN=0,nextUp=null;
DATA.forEach(function(d){SL.forEach(function(s){if(d[s[0]]){totalN++;if(past(d.date,s[1]))doneN++;else if(!nextUp)nextUp={date:d.date,hh:s[1],lab:s[2],item:d[s[0]]};}});});
function slotHtml(item,date,hh,lab,kind){
  if(!item)return '<div class="slot '+kind+'"><div class="lab">'+lab+'</div><div class="ph none">—</div></div>';
  var p=past(date,hh),isT=(date===today);
  var txt=p?'게시완료':(isT?'오늘 예정':'예정'),cls=p?'done':(isT?'now':'soon');
  var m=item.vid?'<video class="ph" src="'+item.thumb+'" muted preload="metadata"></video>':'<img class="ph" loading="lazy" src="'+item.thumb+'">';
  return '<div class="slot '+kind+(p?' isdone':'')+'"><div class="lab">'+lab+'</div><div class="phwrap">'+(item.vid?'<span class="vb">▶</span>':'')+m+'<span class="badge b-'+cls+'">'+txt+'</span></div><div class="meta">#'+item.seq+'</div></div>';
}
function slots(d,big){return '<div class="slots'+(big?' big':'')+'">'+SL.map(function(s){return slotHtml(d?d[s[0]]:null,d?d.date:'',s[1],s[2],s[3]);}).join('')+'</div>';}
function byDate(ds){for(var i=0;i<DATA.length;i++)if(DATA[i].date===ds)return DATA[i];return null;}
function lbl(ds){var dt=new Date(ds+'T00:00:00');return '<span class="dd">'+ds.slice(5).replace('-','/')+'</span> <span class="wd">('+wd[dt.getDay()]+')</span>';}
// summary
var dt0=new Date(today+'T00:00:00');
document.getElementById('sumdate').innerHTML='오늘 '+today.slice(5).replace('-','/')+' ('+wd[dt0.getDay()]+')';
document.getElementById('sumcount').innerHTML='게시 <b>'+doneN+'</b> · 남음 '+(totalN-doneN);
document.getElementById('barfill').style.width=(totalN?Math.round(doneN/totalN*100):0)+'%';
if(nextUp){var nd=new Date(nextUp.date+'T00:00:00');var dn=nextUp.date===today?'오늘':(nextUp.date===tmr?'내일':(nextUp.date.slice(5).replace('-','/')));document.getElementById('nextline').innerHTML='⏭️ 다음 게시: <b>'+dn+' '+nextUp.lab.replace(/^.. /,'')+'</b> (#'+nextUp.item.seq+')';}
else document.getElementById('nextline').innerHTML='🎉 모든 게시 완료';
// today / tomorrow
var tD=byDate(today);document.getElementById('today').innerHTML = tD?('<div class="hero"><div class="hd">'+lbl(today)+'<span class="tg">오늘</span></div>'+slots(tD,true)+'</div>'):'<div class="card"><div class="hd">'+lbl(today)+'</div><div class="meta" style="padding:10px">오늘은 예정된 게시가 없습니다.</div></div>';
var mD=byDate(tmr);document.getElementById('tmr').innerHTML = mD?('<div class="card"><div class="hd">'+lbl(tmr)+'<span class="tg">내일</span></div>'+slots(mD,false)+'</div>'):'<div class="card"><div class="hd">'+lbl(tmr)+'</div><div class="meta" style="padding:8px">예정 없음</div></div>';
// mini row
function mrow(d){
  var cells=SL.map(function(s){var it=d[s[0]];if(!it)return '<span class="m-none">·</span>';var p=past(d.date,s[1]);var m=it.vid?'<video class="m-ph" src="'+it.thumb+'" muted preload="metadata"></video>':'<img class="m-ph" loading="lazy" src="'+it.thumb+'">';return '<span class="m-cell '+s[3]+(p?' isdone':'')+'">'+m+'</span>';}).join('');
  var dt=new Date(d.date+'T00:00:00');
  return '<div class="mrow'+(d.date===today?' istoday':'')+'"><span class="mdate">'+d.date.slice(5).replace('-','/')+' <span class="wd">('+wd[dt.getDay()]+')</span></span><span class="mcells">'+cells+'</span></div>';
}
var up=DATA.filter(function(d){return d.date>tmr;});
var pa=DATA.filter(function(d){return d.date<today;}).reverse();
document.getElementById('listUp').innerHTML = up.length?up.map(mrow).join(''):'<div class="foot">앞으로 일정 없음</div>';
document.getElementById('listPast').innerHTML = pa.length?pa.map(mrow).join(''):'<div class="foot">아직 게시된 날이 없습니다</div>';
function show(w){
  document.getElementById('listUp').className=w==='up'?'':'hide';
  document.getElementById('listPast').className=w==='past'?'':'hide';
  document.getElementById('tabUp').className='tab'+(w==='up'?' on':'');
  document.getElementById('tabPast').className='tab'+(w==='past'?' on':'');
}
</script></body></html>
